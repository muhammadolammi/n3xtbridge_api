<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }

        h1 {
            color: #1a7f37;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f5f5f5;
        }

        .total {
            text-align: right;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>N3xtBridge Holdings Invoice</h1>
    <h2>Invoice #: {{.InvoiceNumber}}</h2>


    <p><strong>Customer:</strong> {{.CustomerName}}</p>
    <p><strong>Email:</strong> {{.CustomerEmail}}</p>
    <p><strong>Date:</strong> {{date .CreatedAt}}</p>

    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody>

            {{range .Items}}
            <tr>
                <td>{{.Name}}</td>
                <td>{{.Quantity}}</td>
                <td>{{money .Price}}</td>
                <!-- <td>{{.Price}}</td> -->
                <td>{{money (itemTotal .Quantity .Price)}}</td>
                <!-- <td>{{mul .Quantity .Price}}</td> -->
            </tr>
            {{end}}

        </tbody>
    </table>

    <!-- <p class="total">Total: ₦ {{.Total}}</p> -->
    <p class="total">Total: {{money .Total}}</p>

</body>

</html>
