<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Message from N3XTBRIDGE</title>
</head>

<body style="margin: 0; padding: 0; background-color: #f4f4f5; font-family: 'Helvetica Neue', Arial, sans-serif;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="center" style="padding: 60px 0;">
                <table border="0" cellpadding="0" cellspacing="0" width="600"
                    style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                    <tr>
                        <td height="6" style="background-color: #000000; border-radius: 8px 8px 0 0;"></td>
                    </tr>

                    <tr>
                        <td align="center" style="padding: 40px 0 20px 0;">
                            <h1
                                style="margin: 0; font-size: 20px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;">
                                N3XTBRIDGE</h1>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 20px 50px 40px 50px; font-size: 16px; line-height: 1.6; color: #374151;">
                            {{message_body}}
                        </td>
                    </tr>

                    <tr>
                        <td
                            style="padding: 30px 50px; background-color: #fafafa; border-radius: 0 0 8px 8px; border-top: 1px solid #f3f4f6;">
                            <p style="margin: 0; font-size: 12px; color: #9ca3af;">
                                <strong>N3XTBRIDGE Support</strong><br>
                                Gwagwalada, Abuja, Nigeria<br>
                                <a href="https://n3xtbridge.com"
                                    style="color: #6b7280; text-decoration: none;">www.n3xtbridge.com</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
